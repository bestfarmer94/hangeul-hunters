<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangeul Hunters · 유저 통계</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f13;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 40px 24px;
        }
        .header {
            max-width: 1100px;
            margin: 0 auto 32px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
        }
        .title {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }
        .updated-at {
            font-size: 12px;
            color: #475569;
        }
        .card {
            max-width: 1100px;
            margin: 0 auto;
            background: #1a1a26;
            border: 1px solid #2d2d44;
            border-radius: 12px;
            overflow: hidden;
        }
        .summary-bar {
            display: flex;
            gap: 32px;
            padding: 20px 28px;
            border-bottom: 1px solid #2d2d44;
            background: #16161f;
        }
        .summary-item { text-align: center; }
        .summary-value {
            font-size: 22px;
            font-weight: 700;
            color: #a78bfa;
        }
        .summary-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 2px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead th {
            background: #13131c;
            padding: 14px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #64748b;
            border-bottom: 1px solid #2d2d44;
        }
        thead th:first-child { width: 48px; text-align: center; }
        thead th:nth-child(4),
        thead th:nth-child(5),
        thead th:nth-child(6) { text-align: right; }
        tbody tr {
            border-bottom: 1px solid #222230;
            transition: background 0.15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #1f1f30; }
        td {
            padding: 13px 16px;
            font-size: 14px;
            color: #cbd5e1;
        }
        td:first-child {
            text-align: center;
            font-size: 12px;
            color: #475569;
        }
        td:nth-child(2) { font-weight: 500; color: #e2e8f0; }
        td:nth-child(3) { color: #94a3b8; font-size: 13px; }
        td:nth-child(4),
        td:nth-child(5),
        td:nth-child(6) { text-align: right; }
        .empty {
            padding: 60px;
            text-align: center;
            color: #475569;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="title">👤 유저 통계</div>
            <div class="subtitle">Hangeul Hunters · Admin Dashboard</div>
        </div>
        <div class="updated-at" th:text="'업데이트: ' + ${updatedAt}"></div>
    </div>

    <div class="card">
        <div class="summary-bar">
            <div class="summary-item">
                <div class="summary-value" th:text="${totalUsers}">0</div>
                <div class="summary-label">전체 유저</div>
            </div>
            <div class="summary-item">
                <div class="summary-value" th:text="${totalRolePlay}">0</div>
                <div class="summary-label">총 롤플레이 대화</div>
            </div>
            <div class="summary-item">
                <div class="summary-value" th:text="${totalReport}">0</div>
                <div class="summary-label">총 리포트 생성</div>
            </div>
            <div class="summary-item">
                <div class="summary-value" th:text="${totalAsk}">0</div>
                <div class="summary-label">총 ASK 질문</div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(stats)}" class="empty">
            등록된 유저가 없습니다.
        </div>

        <table th:unless="${#lists.isEmpty(stats)}">
            <thead>
                <tr>
                    <th>#</th>
                    <th>닉네임</th>
                    <th>이메일</th>
                    <th>롤플레이 대화</th>
                    <th>리포트 생성</th>
                    <th>ASK 질문</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="row, iter : ${stats}">
                    <td th:text="${iter.count}"></td>
                    <td th:text="${row.nickname}"></td>
                    <td th:text="${row.email}"></td>
                    <td th:text="${row.rolePlayCount}"></td>
                    <td th:text="${row.reportCount}"></td>
                    <td th:text="${row.askCount}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
